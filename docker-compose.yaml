x-airflow-common:
  &airflow-common
  build: . # Bảo docker build từ file Dockerfile nằm cùng thư mục

  env_file:
    - .env
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False # Tắt các DAG mẫu cho đỡ rác
  volumes:
    - ./dags:/opt/airflow/dags # Mount thư mục dags từ host vào container
    - ./scripts:/opt/airflow/scripts # Mount thư mục scripts từ host vào container
    - ./plugins:/opt/airflow/plugins # Mount thư mục plugins từ host vào container
    - ./data:/opt/airflow/data
    - ./.env:/opt/airflow/.env
    
services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5433:5432"
    
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true # TỰ ĐỘNG TẠO USER ADMIN
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - _AIRFLOW_WWW_USER_ROLE=Admin
    depends_on:
      - postgres
  
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080" # Cổng để chúng ta truy cập UI
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully